<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel options</title>
<style>
  :root{
    --bg:#f3f3f1;
    --card:#ffffff;
    --line:#d7d8db;
    --text:#0a2955;
    --blue:#0089DD;
    --muted:#4f5b6d;
  }
  *{box-sizing:border-box}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
  }
  .wrap{
    width:min(1420px, calc(100vw - 40px));
    margin:0 auto;
    padding:36px 0 44px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:26px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    text-decoration:none;
    color:inherit;
    display:block;
  }
  .preview{ aspect-ratio:1 / 1; background:#edf2f7; overflow:hidden; }
  .preview img{ width:100%; height:100%; object-fit:cover; display:block; }
  .content{ padding:18px 20px 20px; display:grid; gap:8px; }
  .eyebrow{ color:var(--blue); font-size:13px; font-weight:700; }
  .title{ font-size:28px; line-height:1.05; letter-spacing:-.03em; font-weight:700; margin:0; }
  .note{ color:var(--muted); font-size:15px; line-height:1.4; }
  @media (max-width: 980px){ .grid{grid-template-columns:1fr;} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <a class="card" href="./v1.html">
        <div class="preview"><img src="assets/v1/01.png" alt="Option 1"></div>
        <div class="content">
          <div class="eyebrow">Option 1</div>
          <h2 class="title">Illustrative direction</h2>
          <div class="note">La V1 ne comporte pas de photographies.</div>
        </div>
      </a>
      <a class="card" href="./v2.html">
        <div class="preview"><img src="assets/v2/01.png" alt="Option 2"></div>
        <div class="content">
          <div class="eyebrow">Option 2</div>
          <h2 class="title">Photographic direction</h2>
          <div class="note">La V2 comporte des photographies.</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
