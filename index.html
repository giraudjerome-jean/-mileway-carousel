<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel options</title>
<style>
  :root{
    --bg:#f3f3f1;
    --card:#ffffff;
    --line:#d7d8db;
    --text:#0a2955;
    --blue:#0089DD;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
  }
  .wrap{
    width:min(1420px, calc(100vw - 40px));
    margin:0 auto;
    padding:36px 0 44px;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:26px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
    text-decoration:none;
    color:inherit;
    display:block;
  }
  .preview{
    aspect-ratio:1 / 1;
    background:#edf2f7;
    overflow:hidden;
  }
  .preview img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .content{
    padding:18px 20px 20px;
    display:grid;
    gap:8px;
  }
  .eyebrow{
    color:var(--blue);
    font-size:13px;
    font-weight:700;
  }
  .title{
    font-size:28px;
    line-height:1.05;
    letter-spacing:-.03em;
    font-weight:700;
    margin:0;
  }
  @media (max-width: 1100px){
    .grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <a class="card" href="./option1_wave.html">
        <div class="preview"><img src="assets/option1/01.png" alt="Option 1"></div>
        <div class="content">
          <div class="eyebrow">Option 1</div>
          <h2 class="title">Continuous wave</h2>
        </div>
      </a>

      <a class="card" href="./option2_illustrative.html">
        <div class="preview"><img src="assets/option2/01.jpeg" alt="Option 2"></div>
        <div class="content">
          <div class="eyebrow">Option 2</div>
          <h2 class="title">Illustrative direction</h2>
        </div>
      </a>

      <a class="card" href="./option3_soft_wave.html">
        <div class="preview"><img src="assets/option3/01.jpeg" alt="Option 3"></div>
        <div class="content">
          <div class="eyebrow">Option 3</div>
          <h2 class="title">Soft wave</h2>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
